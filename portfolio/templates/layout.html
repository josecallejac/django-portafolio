{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}José Calleja | Developer{% endblock %}</title>
  
  <link rel="icon" type="image/svg+xml" href="{% static 'portfolio/favicon.svg' %}">

  <!-- Performance hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts - Raleway -->
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="{% static 'main.css' %}">


  {% block stylesheets %}{% endblock %}
</head>

<body>
  <a class="visually-hidden-focusable position-absolute top-0 start-0 m-3 btn btn-light btn-sm" href="#main">
    Saltar al contenido
  </a>

  <!-- Navbar parcial -->
  {% include 'partials/navbar.html' %}

  <!-- Contenido principal -->
  <main id="main">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  <!-- Scripts JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block javascript %}{% endblock %}
</body>

</html>
