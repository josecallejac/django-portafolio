{% extends 'layout.html' %}

{% block title %}{{ post.title }} | Trabajos{% endblock %}

{% block content %}

<section class="section">
  <div class="container" style="max-width: 920px;">
    <a class="btn btn-sm btn-outline-primary mb-4" href="{% url 'blog:posts' %}">
      <i class="fa-solid fa-arrow-left me-2"></i> Volver a trabajos
    </a>

    <header class="mb-4">
      <h1 class="fw-bold mb-2">{{ post.title }}</h1>
      
    </header>

    <div class="rounded-4 overflow-hidden shadow-sm border bg-white mb-4">
      <img src="{{ post.image.url }}" alt="{{ post.title }}" class="img-fluid w-100"
        style="max-height: 420px; object-fit: cover;" loading="lazy">
    </div>

    <div class="content-prose bg-white border rounded-4 p-4 p-md-5 shadow-sm">
      {{ post.description|safe }}
    </div>
  </div>
</section>

{% endblock %}
